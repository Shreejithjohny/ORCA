apiVersion: apps/v1
kind: Deployment
metadata:
  name: orca-backend
  namespace: orca
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orca-backend
  template:
    metadata:
      labels:
        app: orca-backend
    spec:
      containers:
        - name: orca-backend
          # Replace <registry> with your container registry (e.g. ghcr.io/your-org/orca-backend:latest)
          image: <registry>/orca-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: "redis://orca-redis:6379/0"
            - name: PYTHONPATH
              value: "/app"
            - name: OLLAMA_URL
              value: "http://orca-ollama.orca.svc.cluster.local:11434"
          ports:
            - containerPort: 8000
          workingDir: /app
          # If you need runtime configuration, mount a ConfigMap or Secret and set envFrom
          # volumeMounts: []
      # volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: orca-backend
  namespace: orca
spec:
  selector:
    app: orca-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
