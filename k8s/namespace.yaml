apiVersion: v1
kind: Namespace
metadata:
  name: orca
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: orca-resource-quota
  namespace: orca
spec:
  hard:
    pods: "40"
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    requests.storage: 200Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: orca-default-limits
  namespace: orca
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 4Gi
