apiVersion: v1
kind: Service
metadata:
  name: orca-neo4j
  namespace: orca
  labels:
    app: orca-neo4j
spec:
  type: ClusterIP
  selector:
    app: orca-neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
---
apiVersion: v1
kind: Service
metadata:
  name: orca-neo4j-headless
  namespace: orca
  labels:
    app: orca-neo4j
spec:
  clusterIP: None
  selector:
    app: orca-neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orca-neo4j
  namespace: orca
spec:
  serviceName: orca-neo4j-headless
  replicas: 1
  selector:
    matchLabels:
      app: orca-neo4j
  template:
    metadata:
      labels:
        app: orca-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.19-community
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: auth
            - name: NEO4J_server_memory_heap_initial__size
              value: 1G
            - name: NEO4J_server_memory_heap_max__size
              value: 1G
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: neo4j-logs
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
