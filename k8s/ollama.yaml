apiVersion: apps/v1
kind: Deployment
metadata:
  name: orca-ollama
  namespace: orca
  labels:
    app: orca-ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orca-ollama
  template:
    metadata:
      labels:
        app: orca-ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: orca-ollama
  namespace: orca
spec:
  selector:
    app: orca-ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  type: ClusterIP
